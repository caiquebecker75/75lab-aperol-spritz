<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>75 LAB · O Spritz Começa Aqui · Aperol Spritz Lata no Off Trade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#080604;
  --ink2:#100b07;
  --orange:#FF5A00;
  --orange-2:#FF7A1A;
  --amber:#FFA033;
  --cream:#FBEFE2;
  --cream-dim:#c9b9a6;
  --line:rgba(255,255,255,.12);
  --line-strong:rgba(255,255,255,.22);
  --ease:cubic-bezier(.19,1,.22,1);
  --ease2:cubic-bezier(.7,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--ink);color:var(--cream);
  font-family:'Manrope',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{position:fixed;inset:0}
::selection{background:var(--orange);color:#0a0603}

.stage{position:fixed;inset:0;overflow:hidden}
.glow{position:absolute;width:70vw;height:70vw;left:15vw;top:-30vh;border-radius:50%;z-index:0;
  background:radial-gradient(circle,rgba(255,90,0,.20),transparent 60%);filter:blur(40px);
  animation:drift 30s var(--ease) infinite alternate;pointer-events:none}
@keyframes drift{0%{transform:translate3d(-12vw,0,0)}100%{transform:translate3d(14vw,10vh,0)}}
.vign{position:absolute;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(140% 120% at 50% 40%,transparent 60%,rgba(0,0,0,.6))}

.deck{position:absolute;inset:0;z-index:5}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;
  padding:clamp(34px,6vw,110px);opacity:0;visibility:hidden;pointer-events:none;
  transform:translateX(5%);transition:opacity .55s var(--ease2),transform .7s var(--ease),visibility .55s;
  will-change:transform,opacity;background:var(--ink)}
.slide.active{opacity:1;visibility:visible;transform:none;z-index:2;pointer-events:auto}
.slide.prev{transform:translateX(-5%);opacity:0}
.inner{width:100%;max-width:1180px;margin:0 auto;position:relative;z-index:2}

.slide.bg-orange{background:var(--orange);color:#150802}
.slide.bg-orange .eyebrow{color:#150802}
.slide.bg-orange .eyebrow::before{background:#150802}
.slide.bg-orange .grad-text{color:#FBEFE2}
.slide.bg-orange p.lead{color:#2a1305}
.slide.bg-orange .dim{color:#3a1c08}
.slide.bg-orange .rule{background:rgba(20,8,2,.25)}

.ghost{position:absolute;font-family:'Anton';font-size:clamp(90px,20vw,300px);line-height:.8;
  right:clamp(20px,3vw,60px);bottom:clamp(-10px,-1vw,0);color:transparent;
  -webkit-text-stroke:1.5px rgba(255,255,255,.06);z-index:0;pointer-events:none;user-select:none}
.bg-orange .ghost{-webkit-text-stroke:1.5px rgba(20,8,2,.12)}

.r{opacity:0;transform:translateY(26px);transition:opacity .8s var(--ease),transform .8s var(--ease)}
.active .r{opacity:1;transform:none;transition-delay:calc(var(--d,0)*1ms)}
.wipe{clip-path:inset(-0.5em 100% -0.35em 0);transition:clip-path 1s var(--ease)}
.active .wipe{clip-path:inset(-0.5em 0 -0.35em 0);transition-delay:calc(var(--d,0)*1ms)}
/* export mode: revela tudo instantâneo para captura por slide */
.exporting .loader{display:none!important}
.exporting .r{opacity:1!important;transform:none!important;transition:none!important}
.exporting .wipe{clip-path:none!important;transition:none!important}
.exporting .glow{animation:none!important}
.exporting .frame img{transform:scale(1)!important}

.eyebrow{display:inline-flex;align-items:center;gap:14px;font-size:clamp(10px,.85vw,12px);
  letter-spacing:.5em;text-transform:uppercase;color:var(--amber);font-weight:600}
.eyebrow::before{content:"";width:48px;height:1px;background:var(--amber)}
h1,h2,h3{font-family:'Archivo',sans-serif;line-height:1;letter-spacing:-.025em;font-weight:900}
.display{font-family:'Anton',sans-serif;font-weight:400;line-height:.98;text-transform:uppercase;letter-spacing:.005em;padding:.08em 0 .05em}
.grad-text{color:var(--orange)}
p.lead{font-size:clamp(15px,1.45vw,21px);line-height:1.5;color:var(--cream-dim);max-width:56ch;font-weight:400}
.dim{color:var(--cream-dim)}
.rule{width:100%;height:1px;background:var(--line);margin:0}

.topbar{position:fixed;top:0;left:0;right:0;z-index:40;display:flex;align-items:center;
  justify-content:space-between;padding:26px clamp(24px,5vw,64px);pointer-events:none;
  transition:color .5s var(--ease)}
.brandmark{display:flex;align-items:center;gap:11px}
.brandmark .logo{font-family:'Anton';font-size:20px;letter-spacing:.02em;color:#fff}
.brandmark .flask{width:22px;height:22px}
.chip{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:#fff;font-weight:600}
.pbar{position:fixed;left:0;top:0;height:2px;background:var(--orange);z-index:41;width:0;
  transition:width .6s var(--ease)}

.nav{position:fixed;right:clamp(16px,2.2vw,30px);top:50%;transform:translateY(-50%);z-index:40;
  display:flex;flex-direction:column;gap:14px}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.22);cursor:pointer;
  transition:all .4s var(--ease)}
.dot:hover{background:var(--amber)}
.dot.on{background:var(--orange);height:22px;border-radius:4px}

.arrows{position:fixed;bottom:30px;left:clamp(24px,5vw,64px);z-index:40;display:flex;align-items:center;gap:20px}
.arw{width:44px;height:44px;border-radius:50%;border:1px solid var(--line-strong);background:transparent;
  color:var(--cream);display:grid;place-items:center;cursor:pointer;transition:all .35s var(--ease)}
.arw:hover{background:var(--orange);color:#0a0603;border-color:var(--orange)}
.counter{font-family:'Archivo';font-weight:800;font-size:12px;letter-spacing:.2em;color:var(--cream)}
.counter b{color:var(--orange)}
.hint{position:fixed;bottom:34px;right:clamp(24px,5vw,64px);z-index:40;font-size:10px;letter-spacing:.28em;
  text-transform:uppercase;color:#6f5f4d;pointer-events:none}

body.on-orange .brandmark .logo,body.on-orange .chip,body.on-orange .counter,body.on-orange .counter b{color:#150802}
body.on-orange .brandmark .flask path{stroke:#150802}
body.on-orange .arw{border-color:rgba(20,8,2,.4);color:#150802}
body.on-orange .arw:hover{background:#150802;color:var(--orange);border-color:#150802}
body.on-orange .hint{color:rgba(20,8,2,.55)}
body.on-orange .dot{background:rgba(20,8,2,.3)}
body.on-orange .dot.on{background:#150802}
.arw,.counter,.dot,.brandmark .logo,.chip{transition:color .5s var(--ease),background .5s var(--ease),border-color .5s var(--ease)}

/* download PDF button */
.dl-btn{display:inline-flex;align-items:center;gap:9px;font-family:'Archivo';font-weight:800;font-size:12px;
  letter-spacing:.08em;text-transform:uppercase;color:#0a0603;background:var(--orange);padding:11px 18px;
  border-radius:100px;text-decoration:none;cursor:pointer;border:1px solid var(--orange);
  transition:background .35s var(--ease),color .35s var(--ease)}
.dl-btn:hover{background:transparent;color:var(--orange)}
.dl-btn svg{width:15px;height:15px;stroke:currentColor}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:clamp(34px,5vw,80px);align-items:center}
.grid2.rev{direction:rtl}.grid2.rev>*{direction:ltr}
.grid2.lean{grid-template-columns:1.15fr .85fr}

.cards{display:grid;gap:1px;background:var(--line)}
.cards.airy{gap:clamp(22px,3vw,40px) clamp(30px,4vw,60px);background:none}
.c3{grid-template-columns:repeat(3,1fr)}
.c4{grid-template-columns:repeat(4,1fr)}
.c2{grid-template-columns:repeat(2,1fr)}
.card{background:var(--ink);padding:clamp(18px,2vw,26px);position:relative;transition:background .4s var(--ease)}
.cards.airy .card{background:none;padding:0;border-top:1px solid var(--line);padding-top:18px}
.bg-orange .card{background:var(--orange)}
.bg-orange .cards{background:rgba(20,8,2,.2)}
.card:hover h4{color:var(--orange)}
.bg-orange .card:hover h4{color:var(--cream)}
.card .ic{width:30px;height:30px;margin-bottom:14px;display:block}
.ic{display:inline-block}
.ic svg{width:100%;height:100%;display:block}
.card .kicker{font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--amber);font-weight:600}
.bg-orange .card .kicker{color:#150802}
.card h4{font-family:'Archivo';font-weight:800;font-size:clamp(15px,1.3vw,20px);margin:8px 0 8px;
  transition:color .3s var(--ease);letter-spacing:-.01em}
.card p{font-size:13.5px;line-height:1.5;color:var(--cream-dim)}
.bg-orange .card p{color:#3a1c08}
.card .num{font-family:'Anton';font-size:clamp(30px,3vw,46px);color:var(--orange);line-height:.9}

.tag{display:inline-block;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--cream);
  border-bottom:1px solid var(--line-strong);padding-bottom:5px}
.pill-row{display:flex;flex-wrap:wrap;gap:12px 26px}
.pill{font-size:12.5px;letter-spacing:.02em;color:var(--cream);position:relative;padding-bottom:4px}
.pill::after{content:"";position:absolute;left:0;bottom:0;width:0;height:1px;background:var(--orange);transition:width .4s var(--ease)}
.pill:hover::after{width:100%}
.pill:hover{color:var(--orange)}

.frame{position:relative;overflow:hidden;background:#111}
.frame img{display:block;width:100%;height:100%;object-fit:cover;transform:scale(1.04);transition:transform 9s linear,opacity .4s var(--ease)}
.active .frame img{transform:scale(1.14)}
.frame .cap{position:absolute;left:0;bottom:0;z-index:2;font-size:10px;letter-spacing:.24em;
  text-transform:uppercase;color:#fff;background:var(--orange);padding:9px 16px;font-weight:600}
.frame.tall{aspect-ratio:3/4}.frame.wide{aspect-ratio:16/10}
.frame::before{content:"";position:absolute;inset:0;z-index:1;border:1px solid rgba(255,255,255,.1);pointer-events:none}

.stat{font-family:'Anton';font-size:clamp(46px,7vw,110px);line-height:.82;color:var(--orange)}
.stat small{font-family:'Archivo';font-weight:700;font-size:.16em;color:var(--cream);
  display:block;letter-spacing:.14em;margin-top:14px;text-transform:uppercase}
.statset{display:flex;gap:clamp(30px,5vw,80px);flex-wrap:wrap}

.timeline{position:relative;display:grid;grid-template-columns:repeat(5,1fr);gap:0;
  border-top:1px solid var(--line);padding-top:0}
.tl{position:relative;padding:26px 20px 0 0}
.tl::before{content:"";position:absolute;left:0;top:-4px;width:7px;height:7px;border-radius:50%;background:var(--orange)}
.tl .wk{font-family:'Anton';font-size:clamp(20px,2vw,30px);color:var(--orange)}
.tl h5{font-family:'Archivo';font-weight:800;font-size:14px;margin:8px 0 8px;letter-spacing:-.01em}
.tl p{font-size:12px;color:var(--cream-dim);line-height:1.45}

.inv{display:grid;border-top:1px solid var(--line)}
.inv .row{display:grid;grid-template-columns:auto 1fr auto;gap:clamp(14px,2vw,34px);align-items:baseline;
  padding:clamp(9px,1.3vw,16px) 0;border-bottom:1px solid var(--line);transition:padding-left .4s var(--ease)}
.inv .row:hover{padding-left:10px}
.inv .row .idx{font-family:'Archivo';font-weight:800;color:var(--orange);font-size:12px;letter-spacing:.1em}
.inv .row .lbl b{font-family:'Archivo';font-weight:800;display:block;font-size:clamp(14px,1.25vw,18px);letter-spacing:-.01em}
.inv .row .lbl span{font-size:12px;color:var(--cream-dim)}
.inv .row .val{font-family:'Archivo';font-weight:800;color:var(--cream);font-size:clamp(14px,1.25vw,17px);white-space:nowrap}
.inv-total{margin-top:clamp(14px,2vw,26px);display:flex;justify-content:space-between;align-items:baseline;
  flex-wrap:wrap;gap:14px}
.inv-total span{font-family:'Archivo';font-weight:700;letter-spacing:.16em;text-transform:uppercase;font-size:12px;color:var(--cream-dim)}
.inv-total b{font-family:'Anton';font-size:clamp(30px,5vw,64px);color:var(--orange);letter-spacing:.01em;line-height:.9}

.team{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line)}
.member{background:var(--ink);padding:22px 20px;transition:background .4s var(--ease)}
.member:hover{background:#140c07}
.member .ic{width:26px;height:26px;margin-bottom:14px}
.member h5{font-family:'Archivo';font-weight:800;font-size:14px;margin-bottom:8px;letter-spacing:-.01em}
.member p{font-size:12px;color:var(--cream-dim);line-height:1.45}

.kvrow{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line)}
.kv{background:var(--ink);padding:16px 20px;transition:background .4s var(--ease)}
.kv:hover{background:#140c07}
.kv .el{font-family:'Archivo';font-weight:800;color:var(--amber);font-size:12px;letter-spacing:.06em;text-transform:uppercase}
.kv p{font-size:13px;color:var(--cream);margin-top:6px;line-height:1.45}

.big-list{display:grid}
.big-list .li{display:grid;grid-template-columns:auto 1fr;gap:clamp(18px,2.5vw,40px);align-items:baseline;
  padding:clamp(12px,1.6vw,20px) 0;border-bottom:1px solid var(--line)}
.big-list .li:first-child{border-top:1px solid var(--line)}
.big-list .li .k{font-family:'Anton';font-size:clamp(24px,2.6vw,40px);color:var(--orange);line-height:.9}
.big-list .li b{font-family:'Archivo';font-weight:800;font-size:clamp(15px,1.35vw,20px);letter-spacing:-.01em}
.big-list .li>div>span{color:var(--cream-dim);font-size:13.5px;display:block;margin-top:5px;line-height:1.45}
.big-list .li .end{font-family:'Archivo';font-weight:700;color:var(--amber);font-size:12px;text-align:right;max-width:200px;letter-spacing:.02em}
.big-list.tri .li{grid-template-columns:auto 1fr minmax(130px,210px)}

.quote{font-family:'Anton';font-size:clamp(34px,7vw,104px);line-height:1;letter-spacing:.005em;text-transform:uppercase;padding:.08em 0 .05em}

.marquee{overflow:hidden;white-space:nowrap;width:100%}
.marquee .track{display:inline-flex;gap:56px;animation:scroll 24s linear infinite;font-family:'Anton';
  font-size:clamp(30px,5vw,72px);text-transform:uppercase;letter-spacing:.01em}
@keyframes scroll{to{transform:translateX(-50%)}}

/* ===== interactive: tabs (MPDV) ===== */
.tabs{display:flex;flex-direction:column;border-left:1px solid var(--line);margin:22px 0 0}
.tab{text-align:left;background:none;border:none;border-left:2px solid transparent;margin-left:-1px;
  color:var(--cream-dim);cursor:pointer;padding:13px 18px;font-family:'Archivo';font-weight:800;
  font-size:clamp(15px,1.35vw,20px);letter-spacing:-.01em;transition:all .35s var(--ease);display:flex;
  align-items:center;gap:12px}
.tab .tn{font-family:'Anton';color:var(--orange);font-size:15px;opacity:.5;transition:opacity .35s}
.tab:hover{color:var(--cream)}
.tab.on{color:var(--cream);border-left-color:var(--orange)}
.tab.on .tn{opacity:1}
.tabpane{margin-top:20px;border-top:1px solid var(--line);padding-top:18px;min-height:118px}
.tp{display:none}
.tp.on{display:block;animation:fadeUp .5s var(--ease)}
.tp .tk{font-family:'Archivo';font-weight:700;color:var(--amber);font-size:11px;letter-spacing:.16em;text-transform:uppercase}
.tp p{font-size:14px;color:var(--cream-dim);margin:8px 0 12px;line-height:1.5;max-width:38ch}
.tp .cap-line{font-family:'Archivo';font-weight:700;font-size:13px;color:var(--cream);letter-spacing:.02em}

/* ===== interactive: stepper ===== */
.stepper{display:flex;gap:9px;flex-wrap:wrap;margin:6px 0 26px}
.schip{cursor:pointer;padding:10px 16px;border:1px solid var(--line);border-radius:100px;background:none;
  font-family:'Archivo';font-weight:800;font-size:13px;color:var(--cream-dim);letter-spacing:-.01em;
  transition:all .35s var(--ease);display:flex;align-items:center;gap:9px}
.schip .sn{font-family:'Anton';color:var(--orange);font-size:15px}
.schip:hover{border-color:var(--line-strong);color:var(--cream)}
.schip.on{background:var(--orange);border-color:var(--orange);color:#150802}
.schip.on .sn{color:#150802}
.spane{border-top:1px solid var(--line);padding-top:26px;min-height:150px}
.sp{display:none}
.sp.on{display:block;animation:fadeUp .5s var(--ease)}
.sp h4{font-family:'Anton';font-size:clamp(26px,3.4vw,52px);color:var(--cream);text-transform:uppercase;line-height:.95}
.sp .sd{color:var(--amber);font-family:'Archivo';font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase;margin:8px 0 14px}
.sp .sq{font-style:italic;color:var(--amber);font-size:clamp(15px,1.5vw,20px);margin-bottom:10px}
.sp p{font-size:clamp(14px,1.35vw,18px);color:var(--cream-dim);line-height:1.55;max-width:62ch}
.sp .sass{margin-top:14px;font-size:12.5px;color:var(--cream);letter-spacing:.02em}
.sp .sass b{color:var(--amber);font-weight:700}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.count{font-variant-numeric:tabular-nums}

/* ===== case showcase (aspecto natural, sem corte) ===== */
.shot{border:1px solid var(--line);overflow:hidden;background:#0d0906;line-height:0;
  box-shadow:0 24px 60px -24px rgba(0,0,0,.75);transition:transform .5s var(--ease),border-color .5s var(--ease)}
.shot:hover{transform:translateY(-5px);border-color:rgba(255,150,60,.45)}
.shot img{width:100%;height:auto;display:block}
.wc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.pieces{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}
.piece{border:1px solid var(--line);overflow:hidden;line-height:0;position:relative;
  transition:border-color .35s var(--ease),transform .35s var(--ease)}
.piece:hover{border-color:rgba(255,150,60,.6);transform:scale(1.04);z-index:3}
.piece img{width:100%;height:auto;display:block}

/* ===== zoom / lightbox (tela cheia) ===== */
.shot img,.piece img,.frame img{cursor:zoom-in}
.shot{position:relative}
.shot::after,.piece::after,.frame::after{content:"⤢";position:absolute;top:8px;right:8px;width:26px;height:26px;
  border-radius:50%;background:rgba(0,0,0,.55);color:#fff;display:grid;place-items:center;font-size:13px;z-index:4;
  opacity:0;transition:opacity .3s var(--ease);pointer-events:none}
.shot:hover::after,.piece:hover::after,.frame:hover::after{opacity:1}
.lightbox{position:fixed;inset:0;z-index:90;background:rgba(6,4,2,.96);display:flex;align-items:center;
  justify-content:center;padding:3vh 3vw;opacity:0;visibility:hidden;cursor:zoom-out;
  transition:opacity .35s var(--ease),visibility .35s;backdrop-filter:blur(4px)}
.lightbox.on{opacity:1;visibility:visible}
.lightbox img{max-width:94vw;max-height:94vh;object-fit:contain;border:1px solid var(--line-strong);
  box-shadow:0 40px 140px -20px #000;transform:scale(.95);transition:transform .4s var(--ease)}
.lightbox.on img{transform:scale(1)}
.lx-close{position:absolute;top:22px;right:26px;width:44px;height:44px;border-radius:50%;
  border:1px solid var(--line-strong);color:var(--cream);display:grid;place-items:center;cursor:pointer;
  background:rgba(0,0,0,.4);font-size:18px;z-index:2;transition:all .3s var(--ease)}
.lx-close:hover{background:var(--orange);color:#0a0603;border-color:var(--orange)}
.lx-hint{position:absolute;bottom:22px;left:0;right:0;text-align:center;font-size:10px;
  letter-spacing:.28em;text-transform:uppercase;color:#8a765f;pointer-events:none}

@media(max-width:900px){
  .grid2,.grid2.lean{grid-template-columns:1fr;gap:26px}
  .grid2.rev{direction:ltr}
  .c3,.c4{grid-template-columns:1fr 1fr}
  .timeline,.team{grid-template-columns:1fr 1fr}
  .wc-grid{grid-template-columns:1fr 1fr}
  .pieces{grid-template-columns:repeat(3,1fr)}
  .nav{display:none}
  .slide{padding:86px 24px 96px}
  .ghost{display:none}
}
@media(max-width:560px){.c3,.c4,.c2,.team,.kvrow{grid-template-columns:1fr}}

/* ============ PRINT / PDF ============ */
@media print{
  @page{size:1280px 720px;margin:0}
  html,body{position:static;overflow:visible;height:auto;background:var(--ink)}
  *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;
    animation:none !important;transition:none !important}
  .loader,.topbar,.pbar,.nav,.arrows,.hint,.glow,.vign,.dl-btn{display:none !important}
  .stage{position:static}.deck{position:static}
  .slide{position:relative;inset:auto;width:1280px;height:720px;opacity:1 !important;
    visibility:visible !important;transform:none !important;page-break-after:always;
    break-after:page;overflow:hidden;padding:52px 64px;display:flex}
  .slide:last-child{page-break-after:auto}

/* ============ ENGINE ============ */
const deck=document.getElementById('deck'), nav=document.getElementById('nav');
slides.forEach((s,i)=>{
  const el=document.createElement('section');
  el.className='slide bg-'+s.bg; el.dataset.i=i;
  el.innerHTML=s.html+`<div class="ghost">${String(i+1).padStart(2,'0')}</div>`;
  deck.appendChild(el);
  const d=document.createElement('div'); d.className='dot'; d.onclick=()=>go(i); nav.appendChild(d);
});
const els=[...document.querySelectorAll('.slide')], dots=[...document.querySelectorAll('.dot')];
document.getElementById('tot').textContent=String(slides.length).padStart(2,'0');
let idx=0, locked=false;

/* interactive: tabs + steppers (event delegation) */
document.addEventListener('click',e=>{
  const tab=e.target.closest('.tab');
  if(tab){const box=tab.closest('[data-tabbox]');
    box.querySelectorAll('.tab').forEach(x=>x.classList.remove('on')); tab.classList.add('on');
    box.querySelectorAll('.tp').forEach(p=>p.classList.toggle('on',p.dataset.k===tab.dataset.k));
    const img=box.querySelector('.tabimg'); if(img&&tab.dataset.img){img.style.opacity=0;
      setTimeout(()=>{img.src=A+tab.dataset.img;img.style.opacity=1},180);}
    const cap=box.querySelector('.frame .cap'); if(cap&&tab.dataset.cap)cap.textContent=tab.dataset.cap;
    return;}
  const chip=e.target.closest('.schip');
  if(chip){const box=chip.closest('[data-stepbox]');
    box.querySelectorAll('.schip').forEach(x=>x.classList.remove('on')); chip.classList.add('on');
    box.querySelectorAll('.sp').forEach(p=>p.classList.toggle('on',p.dataset.k===chip.dataset.k));}
});

/* count-up */
function runCountups(el){
  el.querySelectorAll('.count').forEach(n=>{
    const to=parseFloat(n.dataset.to)||0, dur=1100; let start=null;
    n.textContent='0';
    function step(ts){if(start===null)start=ts;const p=Math.min(1,(ts-start)/dur);
      const e=1-Math.pow(1-p,3); n.textContent=Math.round(to*e); if(p<1)requestAnimationFrame(step);}
    requestAnimationFrame(step);
    setTimeout(()=>{n.textContent=Math.round(to)},dur+80);
  });
}

/* lightbox · tela cheia para KV e peças */
const lb=document.getElementById('lightbox'), lxImg=document.getElementById('lxImg');
let lbOpen=false;
function openLB(src){lxImg.src=src;lb.classList.add('on');lbOpen=true;}
function closeLB(){lb.classList.remove('on');lbOpen=false;}
document.addEventListener('click',e=>{
  if(lbOpen){closeLB();return;}
  const img=e.target.closest('.shot img,.piece img,.frame img');
  if(img)openLB(img.currentSrc||img.src);
});

function paintChrome(){
  const orange=els[idx].classList.contains('bg-orange');
  document.getElementById('pbar').style.background=orange?'#150802':'#FF5A00';
  document.body.classList.toggle('on-orange',orange);
}
function go(n){
  n=Math.max(0,Math.min(slides.length-1,n)); if(n===idx)return; locked=true;
  els[idx].classList.remove('active'); els[idx].classList.add('prev');
  idx=n;
  setTimeout(()=>els.forEach((e,i)=>{if(i!==idx)e.classList.remove('prev')}),40);
  els[idx].classList.add('active');
  dots.forEach((d,i)=>d.classList.toggle('on',i===idx));
  document.getElementById('cur').textContent=String(idx+1).padStart(2,'0');
  document.getElementById('pbar').style.width=(idx/(slides.length-1)*100)+'%';
  paintChrome(); runCountups(els[idx]);
  setTimeout(()=>locked=false,620);
}
const next=()=>go(idx+1), prev=()=>go(idx-1);
document.getElementById('next').onclick=next; document.getElementById('prev').onclick=prev;
addEventListener('keydown',e=>{
  if(e.key==='Escape'&&lbOpen){closeLB();return}
  if(lbOpen)return;
  if(['ArrowRight','ArrowDown','PageDown',' '].includes(e.key)){e.preventDefault();next()}
  if(['ArrowLeft','ArrowUp','PageUp'].includes(e.key)){e.preventDefault();prev()}
  if(e.key==='Home')go(0); if(e.key==='End')go(slides.length-1);
});
let wl=false;
addEventListener('wheel',e=>{if(lbOpen||wl||locked)return;if(Math.abs(e.deltaY)<18&&Math.abs(e.deltaX)<18)return;
  wl=true;(e.deltaY>0||e.deltaX>0)?next():prev();setTimeout(()=>wl=false,760)},{passive:true});
let tx=0,ty=0;
addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.max(Math.abs(dx),Math.abs(dy))<44)return;(Math.abs(dx)>Math.abs(dy)?dx<0:dy<0)?next():prev()},{passive:true});

const EXPORT=location.search.indexOf('export')>=0;
if(EXPORT)document.documentElement.classList.add('exporting');
addEventListener('load',()=>setTimeout(()=>{
  document.getElementById('loader').classList.add('done');
  const start=Math.max(0,Math.min(slides.length-1,(parseInt(location.hash.replace('#',''))||1)-1));
  idx=start;
  els[start].classList.add('active'); dots[start].classList.add('on');
  document.getElementById('cur').textContent=String(start+1).padStart(2,'0');
  document.getElementById('pbar').style.width=(start/(slides.length-1)*100)+'%';
  paintChrome();
},EXPORT?60:2000));
</script>
